<div class="news-map">
	<div class="_map">
		<map-leaflet ref="map" :options="map_options" :map_style="map_style" :map_onEachFeature="map_onEachFeature" :map_filter="map_filter">
			<template #markers v-if="view === 'republika'">
				<template v-for="marker in data.gps.coord.filter(x => data.gps.data.find(y => x.obec === y.obec)).map(x => [x.obec, x.value, [0,6,5,2.75,2,5,5.5][Number(data.gps.data.find(y => x.obec === y.obec).DRUHZASTUP)], data.gps.data.find(y => x.obec === y.obec).NAZEVZAST])">
					<l-marker :lat-lng="marker[1].split(',')" @click="$router.push('/volby/komunalni-volby/176/obec/' + marker[0])">
						<l-icon icon-url="https://static.programydovoleb.cz/img/map-icon.png" :icon-size="[68/marker[2],96/marker[2]]" :icon-anchor="[68/marker[2]/2,96/marker[2]]"></l-icon>
						<l-tooltip :content="marker[3]"></l-tooltip>
					</l-marker>
				</template>
			</template>
			<p-box :click="() => map_change('senat')" v-if="view != 'senat'">
					<p-box-button icon="senatni-volby">Senátní volby</p-box-button>
				</p-box>
				<p-box :click="() => map_change('republika')" v-if="view === 'senat'">
					<p-box-button icon="komunalni-volby">Komunální volby</p-box-button>
				</p-box>
		</map-leaflet>
	</div>
</div>
